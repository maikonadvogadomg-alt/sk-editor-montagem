name: Gerar APK Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    runs-on: ubuntu-latest
    needs: deploy-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Gerar keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass skpassword123 -keypass skpassword123 \
            -dname "CN=SK Code Editor, OU=App, O=SKEditor, L=BR, ST=SP, C=BR"

      - name: Descobrir URL do GitHub Pages
        id: pageurl
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "url=https://${OWNER}.github.io/${REPO}/" >> $GITHUB_OUTPUT

      - name: Criar twa-manifest.json
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PKG="com.$(echo $OWNER | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g').$(echo $REPO | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')"
          URL="${{ steps.pageurl.outputs.url }}"
          cat > twa-manifest.json << EOF
          {
            "packageId": "$PKG",
            "host": "${OWNER}.github.io",
            "name": "SK Code Editor",
            "launcherName": "SK Editor",
            "display": "standalone",
            "themeColor": "#1a237e",
            "navigationColor": "#1a237e",
            "backgroundColor": "#0d1117",
            "enableNotifications": false,
            "startUrl": "/${REPO}/",
            "iconUrl": "${URL}icon-192.png",
            "maskableIconUrl": "${URL}icon-192.png",
            "appVersion": "4.0.0",
            "appVersionCode": 4,
            "signingKey": { "path": "../android.keystore", "alias": "app" },
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "${URL}manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "minSdkVersion": 21,
            "orientation": "default",
            "fullScopeUrl": "${URL}"
          }
          EOF

      - name: Build APK
        run: |
          mkdir -p twa-app
          cd twa-app
          bubblewrap init --manifest ../twa-manifest.json
          bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: skpassword123
          BUBBLEWRAP_KEY_PASSWORD: skpassword123

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: SK-Code-Editor-APK
          path: "**/*.apk"
          retention-days: 30
