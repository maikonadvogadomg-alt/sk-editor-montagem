name: "\uD83E\uDD16 Build APK - SK Code Editor"

on:
  workflow_dispatch:
    inputs:
      pages_url:
        description: "URL do GitHub Pages (deixe vazio para calcular automaticamente)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes Android SDK
        run: |
          yes | sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools" 2>/dev/null || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Calcular URL e dados do app
        id: url
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          INPUT_URL="${{ github.event.inputs.pages_url }}"
          if [ -n "$INPUT_URL" ]; then
            PAGES_URL="$INPUT_URL"
          else
            PAGES_URL="https://${OWNER}.github.io/${REPO}/"
          fi
          HOST=$(echo "$PAGES_URL" | sed 's|https://||' | sed 's|/.*||')
          OWNER_CLEAN=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          REPO_CLEAN=$(echo "$REPO"  | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]//g')
          PKG="com.${OWNER_CLEAN}.${REPO_CLEAN}"
          echo "pages_url=$PAGES_URL" >> $GITHUB_OUTPUT
          echo "host=$HOST"           >> $GITHUB_OUTPUT
          echo "pkg=$PKG"             >> $GITHUB_OUTPUT
          echo "✅ URL: $PAGES_URL | Host: $HOST | Package: $PKG"

      - name: Gerar keystore de assinatura
        run: |
          keytool -genkey -v \
            -keystore release.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=SK Code Editor, OU=App, O=DevMobile, L=BR, ST=SP, C=BR"
          echo "✅ Keystore gerada"

      - name: Criar projeto Android (TWA sem Bubblewrap)
        run: |
          PAGES_URL="${{ steps.url.outputs.pages_url }}"
          HOST="${{ steps.url.outputs.host }}"
          PKG="${{ steps.url.outputs.pkg }}"

          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/mipmap-hdpi
          mkdir -p twa-app/gradle/wrapper

          # ── settings.gradle ────────────────────────────────────────────────
          cat > twa-app/settings.gradle << 'GRADLE'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "SKCodeEditor"
include ':app'
GRADLE

          # ── build.gradle (raiz) ─────────────────────────────────────────────
          cat > twa-app/build.gradle << 'GRADLE'
plugins {
    id 'com.android.application' version '8.2.2' apply false
}
GRADLE

          # ── app/build.gradle ────────────────────────────────────────────────
          cat > twa-app/app/build.gradle << GRADLE
plugins { id 'com.android.application' }
android {
    compileSdk 34
    namespace '$PKG'
    defaultConfig {
        applicationId '$PKG'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '2.0'
    }
    signingConfigs {
        release {
            storeFile file('../../release.keystore')
            storePassword 'android123'
            keyAlias 'app'
            keyPassword 'android123'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
dependencies {
    implementation 'androidx.core:core:1.12.0'
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
GRADLE

          # ── AndroidManifest.xml ─────────────────────────────────────────────
          cat > twa-app/app/src/main/AndroidManifest.xml << MANIFEST
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET" />
    <application
        android:label="SK Code Editor"
        android:allowBackup="true"
        android:supportsRtl="true"
        android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">

        <activity
            android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
            android:exported="true">
            <meta-data
                android:name="android.support.customtabs.trusted.DEFAULT_URL"
                android:value="$PAGES_URL" />
            <meta-data
                android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                android:resource="@color/colorPrimary" />
            <meta-data
                android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                android:resource="@color/colorPrimary" />
            <meta-data
                android:name="android.support.customtabs.trusted.FALLBACK_STRATEGY"
                android:value="customtabs" />
            <meta-data
                android:name="android.support.customtabs.trusted.SCREEN_ORIENTATION"
                android:value="portrait" />
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
            <intent-filter android:autoVerify="true">
                <action android:name="android.intent.action.VIEW"/>
                <category android:name="android.intent.category.DEFAULT"/>
                <category android:name="android.intent.category.BROWSABLE"/>
                <data android:scheme="https" android:host="$HOST"/>
            </intent-filter>
        </activity>

        <service
            android:name="com.google.androidbrowserhelper.trusted.DelegationService"
            android:exported="true"
            android:permission="android.permission.BIND_CUSTOM_TABS_CONNECTION">
            <intent-filter>
                <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                <category android:name="android.intent.category.DEFAULT"/>
            </intent-filter>
        </service>

    </application>
</manifest>
MANIFEST

          # ── res/values/strings.xml ──────────────────────────────────────────
          cat > twa-app/app/src/main/res/values/strings.xml << STRINGS
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">SK Code Editor</string>
    <string name="asset_statements">[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"$PAGES_URL"}}]</string>
</resources>
STRINGS

          # ── res/values/colors.xml ───────────────────────────────────────────
          cat > twa-app/app/src/main/res/values/colors.xml << 'COLORS'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="colorPrimary">#0d1117</color>
    <color name="colorPrimaryDark">#0d1117</color>
    <color name="colorAccent">#58a6ff</color>
</resources>
COLORS

          # ── gradle/wrapper/gradle-wrapper.properties ────────────────────────
          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
WRAPPER

          # ── gradle/wrapper/gradle-wrapper.jar (baixar) ──────────────────────
          curl -sL \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o twa-app/gradle/wrapper/gradle-wrapper.jar || \
          wget -q \
            "https://repo.maven.apache.org/maven2/org/gradle/gradle-wrapper/8.4/gradle-wrapper-8.4.jar" \
            -O twa-app/gradle/wrapper/gradle-wrapper.jar || true

          # ── gradlew script ──────────────────────────────────────────────────
          cat > twa-app/gradlew << 'GRADLEW'
#!/bin/sh
exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"
GRADLEW
          chmod +x twa-app/gradlew

          # ── gradle.properties ───────────────────────────────────────────────
          cat > twa-app/gradle.properties << 'GPROPS'
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
GPROPS

          echo "✅ Projeto Android criado"
          find twa-app -type f | sort

      - name: Setup Gradle (cache)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build APK com Gradle
        working-directory: twa-app
        run: |
          gradle assembleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all 2>&1 | tail -150
          echo "✅ Build concluído!"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Localizar APK
        id: apk
        run: |
          APK=$(find twa-app -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK não encontrado!"
            find twa-app -type f | grep -v ".gradle\|build/tmp\|build/intermediates" | tail -30
            exit 1
          fi
          echo "path=$APK" >> $GITHUB_OUTPUT
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "✅ APK: $APK ($SIZE)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SK-Code-Editor-APK-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Resumo
        run: |
          echo "## ✅ APK Gerado com Sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | SK Code Editor |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.url.outputs.pages_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ steps.url.outputs.pkg }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Baixe o arquivo **.apk** na aba **Artifacts** acima e instale no celular." >> $GITHUB_STEP_SUMMARY
